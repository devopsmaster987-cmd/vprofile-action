name: vprofile actions

on:
  workflow_dispatch:
    inputs:
      skip_sonar:
        description: 'Skip SonarQube scan and quality gate'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: vprofile
  EKS_CLUSTER: VPROFILE-EKS
  NAMESPACE: dev

jobs:
  Testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java 11
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: temurin
          java-version: '11'

      - name: Run Maven Tests
        run: mvn test

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle

      - name: SonarQube Scan
        if: ${{ !inputs.skip_sonar }}
        uses: sonarsource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/target/**,src/main/resources/*.sql,src/main/resources/application.properties

      - name: SonarQube Quality Gate
        if: ${{ !inputs.skip_sonar }}
        uses: sonarsource/sonarqube-quality-gate-action@8e9b0ca0a7273d6f16986388d98393efdfcf56fd # master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

  BUILD_AND_PUBLISH:
    needs: Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build and Push Docker Image to ECR
        uses: appleboy/docker-ecr-action@174bc7ab545bf5c4f4492240c4d839a987643559 # v0.0.3
        with:
          access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          registry: ${{ secrets.REGISTRY }}
          repo: ${{ env.ECR_REPOSITORY }}
          region: ${{ env.AWS_REGION }}
          tags: latest,${{ github.run_number }}
          dockerfile: ./Dockerfile
          context: ./

  DEPLOYTOEKS:
    needs: BUILD_AND_PUBLISH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Verify Cluster Connection
        run: kubectl get nodes

      - name: Create ECR Image Pull Secret
        env:
          DOCKER_SERVER: ${{ secrets.REGISTRY }}
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server="$DOCKER_SERVER" \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" \
            --namespace="${{ env.NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Application with Helm
        uses: peymanmortazavi/eks-helm-deploy@6740a4677efe6d80bd90945bf8eb1ef430fc3f4e # v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          cluster-name: ${{ env.EKS_CLUSTER }}
          namespace: ${{ env.NAMESPACE }}
          name: vprofile-stack
          chart-path: helm/vprofilecharts
          values: appimage=${{ secrets.REGISTRY }}/${{ env.ECR_REPOSITORY }},apptag=${{ github.run_number }}